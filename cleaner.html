<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sheet Music Cleaner</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #111; color: #eee; font-family: monospace; padding: 1.5rem; }
      h2 { margin-bottom: 1rem; font-size: 1.1rem; letter-spacing: 0.05em; }

      .controls { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin-bottom: 1.5rem; }
      .controls label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #ccc; }
      input[type="file"] { color: #eee; font-family: monospace; }
      input[type="number"] { width: 55px; background: #222; color: #eee; border: 1px solid #444; padding: 2px 4px; font-family: monospace; }
      input[type="range"] { width: 110px; vertical-align: middle; }

      #status { font-size: 0.8rem; color: #888; margin-bottom: 1rem; min-height: 1.2em; }

      .output { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: flex-start; }
      .panel { display: flex; flex-direction: column; gap: 0.4rem; }
      .panel h3 { font-size: 0.8rem; color: #888; }
      canvas { display: block; max-width: 100%; border: 1px solid #333; background: #fff; }
    </style>
  </head>
  <body>
    <h2>Sheet Music Cleaner</h2>

    <div class="controls">
      <label>
        PDF:
        <input type="file" id="pdf-input" accept=".pdf" />
      </label>
      <label>
        Page:
        <input type="number" id="page-input" min="1" value="1" />
      </label>
      <label>
        Zoom: <span id="zoom-display">100%</span>
        <input type="range" id="zoom" min="25" max="300" value="100" step="5" style="width:120px;" />
      </label>
    </div>

    <div id="status">Load a PDF to begin.</div>

    <div class="output">
      <div class="panel">
        <h3>Original</h3>
        <canvas id="canvas-original"></canvas>
      </div>
      <div class="panel">
        <h3>Cleaned (staff lines removed)</h3>
        <canvas id="canvas-cleaned"></canvas>
      </div>
    </div>

    <script type="module" src="/src/cleaner.ts"></script>
  </body>
</html>
